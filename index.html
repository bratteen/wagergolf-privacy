<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wager Golf</title>
  <meta name="description" content="Wager Golf, appen för betting mellan golfkompisar. 25 spelformer, automatisk avräkning, Swish-uppgörelse.">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      background: #f5efe3;
      color: #171411;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      line-height: 1.6;
    }
    .container {
      max-width: 560px;
      text-align: center;
    }
    .logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    h1 {
      font-family: "Times New Roman", Georgia, serif;
      font-size: 56px;
      color: #0a2e21;
      margin-bottom: 16px;
      letter-spacing: -1px;
      line-height: 1.05;
    }
    .tagline {
      font-size: 18px;
      color: #4a3f33;
      margin-bottom: 8px;
    }
    .status {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 14px;
      background: rgba(201,169,97,0.18);
      color: #7d5c1f;
      font-size: 13px;
      font-weight: 600;
      border-radius: 999px;
      letter-spacing: 0.3px;
    }
    .features {
      margin: 48px 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      text-align: left;
    }
    .feature {
      padding: 16px;
      background: rgba(255,255,255,0.6);
      border-radius: 12px;
    }
    .feature-num {
      font-family: "Times New Roman", serif;
      font-size: 28px;
      color: #c9a961;
      margin-bottom: 4px;
    }
    .feature-text {
      font-size: 13px;
      color: #4a3f33;
      line-height: 1.4;
    }
    .links {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
      font-size: 14px;
    }
    .links a {
      color: #16533c;
      text-decoration: none;
      font-weight: 500;
    }
    .links a:hover {
      text-decoration: underline;
    }
    footer {
      margin-top: 48px;
      font-size: 13px;
      color: #8a7d6e;
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="logo">
      <img src="/assets/logo.png" alt="Wager Golf" width="120" height="120">
    </div>
    <h1>Wager Golf</h1>
    <p class="tagline">Betting mellan golfkompisar, utan papper och miniräknare.</p>
    <span class="status">Lanseras snart i App Store</span>

    <div class="features">
      <div class="feature">
        <div class="feature-num">25</div>
        <div class="feature-text">spelformer med automatisk avräkning</div>
      </div>
      <div class="feature">
        <div class="feature-num">705</div>
        <div class="feature-text">svenska banor med par och stroke-index</div>
      </div>
      <div class="feature">
        <div class="feature-num">·</div>
        <div class="feature-text">Riktig Swish-uppgörelse via QR och deep-link</div>
      </div>
    </div>

    <div class="links">
      <a href="/privacy/">Integritetspolicy</a>
      <a href="mailto:bratt.gustaf@gmail.com">Kontakt</a>
    </div>

    <footer>
      © Gustaf Bratt
    </footer>
  </main>
</body>
</html>
